<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Logbook – Min Aik Technology</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body {
  background: linear-gradient(to right, #e3f2fd, #ffffff);
  font-family: 'Segoe UI', Tahoma, sans-serif;
  margin: 0;
}

/* Header */
.site-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 40px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  color: white;
}

.logo { height: 60px; }

.nav-menu ul {
  list-style: none;
  display: flex;
  gap: 25px;
}

.nav-menu a {
  padding: 10px 18px;
  color: black;
  text-decoration: none;
  font-size: 18px;
}

.nav-menu a:hover {
  background: black;
  color: white;
  border-radius: 8px;
}
.summary-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 15px auto 25px auto;
  flex-wrap: wrap;
}

.summary-card {
  width: 180px;
  padding: 20px;
  border-radius: 12px;
  color: white;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.summary-card:hover {
  transform: translateY(-5px);
}

.summary-card .label {
  font-size: 14px;
  opacity: 0.9;
}

.summary-card .value {
  font-size: 28px;
  font-weight: bold;
  margin-top: 8px;
}

/* Colors */
.summary-card.total {
  background: linear-gradient(135deg, #2196f3, #64b5f6);
}

.summary-card.work {
  background: linear-gradient(135deg, #4caf50, #81c784);
}
/* Layout (Dashboard style) */
.calendar-container {
  display: grid;
  grid-template-columns: 2fr 1fr;
  max-width: 1200px;
  margin: 30px auto;
  gap: 20px;
}

#calendar {
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

#logDetails {
  background: white;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  min-height: 400px;
}

#logDetails:hover {
  transform: translateY(-3px);
  transition: 0.2s;
}

/* Title */
h2 {
  text-align: center;
  color: #000000;
}

/* Calendar hover */
.fc-daygrid-day:hover {
  background-color: #e3f2fd;
  cursor: pointer;
}

/* Right panel */
.log-date {
  font-size: 24px;
  font-weight: bold;
  color: white;
  background: #000000;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  margin-bottom: 15px;
}

.log-content {
  background: #f8f9fa;
  border-left: 4px solid #000000;
  padding: 12px;
  border-radius: 6px;
  line-height: 1.6;
}

.selected-day {
  background-color: #bbdefb ;
  border-radius: 6px;
}

/* Responsive */
@media (max-width: 900px) {
  .calendar-container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <img src="images/logo.jpg" class="logo">
  <nav class="nav-menu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about me.html">About Me</a></li>
      <li><a href="about company.html">About Company</a></li>
    </ul>
  </nav>
</header>

<section>
  <h2>Internship Logbook</h2>

  <div class="summary-container">
    <div class="summary-card total">
      <div class="label">Total Days</div>
      <div class="value" id="totalDays"></div>
    </div>

    <div class="summary-card work">
      <div class="label">Work Days</div>
      <div class="value" id="workDays"></div>
    </div>
  </div>

  <div class="calendar-container">
    <div id="calendar"></div>
    <div id="logDetails">Click a date or use ← → keys.</div>
  </div>
</section>


<script>
let selectedDateStr=null;
document.addEventListener('DOMContentLoaded', function () {

  var calendarEl = document.getElementById('calendar');

  var events = [
    {
      title: "Report for duty & HR briefing",
      date: "2026-04-01",
      details: "I reported for duty at Min Aik Technology Sdn. Bhd. Upon arrival, I registered my fingerprints for daily access and attended a company briefing conducted by the Human Resource Department. During the session, I became familiar with the company’s workflow and operational processes, including an introduction to Statistical Process Control (SPC)."
    },
    {
      title: "Exposure to Quality Control Procedures",
      date: "2026-04-02",
      details: "I accompanied my supervisor to the quality control sections of each production line, where I observed inspection procedures and gained insight into quality monitoring practices."
    },
    {
      title: "Understanding Process Control Plan",
      date: "2026-04-03",
      details: "I revisited the production lines with my supervisor and was introduced to the Process Control Plan, which outlines methods used to maintain and improve product quality."
    },
    {
      title: "Rest day",
      date: "2026-04-04",
      type:"Rest day",
      details: "Rest day."
    },
    {
      title: "Rest day",
      date: "2026-04-05",
      type:"Rest day",
      details: "Rest day."
    },

    {
      title: "Project Assignment and Requirement Understanding",
      date: "2026-04-06",
      details: "On this day, I was assigned by my supervisor to develop a file checker system aimed at automating the validation of Excel-based reports such as OQA reports and Smartsheet data. I focused on understanding the project requirements, including the types of files involved, their structures, and the key validation rules such as lot number conditions, inspection types, and data completeness. I also identified the expected output of the system, which includes detecting errors and generating validation results. This initial stage helped me understand the importance of data accuracy in quality control processes and laid a strong foundation for further development."
    },
    {
      title: "System Logic Design and Production Flow Exposure",
      date: "2026-04-07",
      details: "On this day, I began designing the system logic using Python. This involved planning how to read Excel files using libraries such as Pandas, identifying relevant sheets such as the Supplier Cover Sheet and Critical Parameter Data, and structuring the program into functions to ensure better organization and scalability. In addition, my supervisor brought me to observe the production flow, where I learned about the overall manufacturing process, quality control procedures at different stages, and the importance of accurate data recording. This exposure provided valuable practical insight and helped me align the system design with real industrial applications."
    },
    {
      title: "Development of Core Validation Functions",
      date: "2026-04-08",
      details: "On this day, I continued developing the program by implementing the core validation functions. I worked on writing logic to verify conditions such as lot number thresholds and inspection requirements, as well as checking whether all required data fields were properly filled. I also handled variations in file structure and formatting to ensure the program could function reliably. Furthermore, I improved the robustness of the system by addressing potential errors such as missing sheets or inconsistent column names, which enhanced my problem-solving skills."
    },
    {
      title: "Web Interface Design and Development",
      date: "2026-04-09",
      details: "On this day, I started developing a web-based interface to improve the usability of the system. Instead of running the Python program manually, users can interact with the system through a webpage. I designed the layout using HTML and CSS, planned the user workflow from file upload to result display, and ensured that the interface presents validation results clearly and effectively. This phase introduced me to frontend development and improved my understanding of user-centered design."
    },
    {
      title: "Integration of Frontend and Backend Systems",
      date: "2026-04-10",
      details: "On this day, I focused on integrating the web interface with the backend Python logic using a framework such as Flask. This involved handling file uploads from the webpage, passing the uploaded files to the validation program, and returning the results to the user interface. I also ensured that the system provides meaningful feedback, such as error messages when validation fails and confirmation messages when all requirements are met. This integration process enhanced my understanding of full-stack development and how different components interact in real-world applications."
    },
    {
      title: "Rest day",
      date: "2026-04-11",
      type:"Rest day",
      details: "Rest day."
    },
    {
      title: "Rest day",
      date: "2026-04-12",
      type:"Rest day",
      details: "Rest day."
    },
    {
      title: "Development of Automated File Checker Program",
      date: "2026-04-13",
      details: "Continued development of the automated file checker program by improving coding logic for file validation and error detection. Focused on enhancing the program’s capability to verify data consistency, identify discrepancies, and support automation of manual file checking processes. Performed debugging and preliminary functional testing to evaluate system performance and accuracy."
    },
    {
      title: "Program Optimization and Functional Verification",
      date: "2026-04-14",
      details: "Continued coding and optimization of the automated file checker system. Worked on refining checking algorithms, improving program flow, and resolving issues identified during testing. Conducted additional verification to ensure the system could reliably detect missing or mismatched information and improve the robustness of the automation process."
    },
    {
      title: "File Checker Development and Statistical Process Control (SPC) Review",
      date: "2026-04-15",
      details: "Continued development of the automated file checker program, focusing on improving validation functions and overall system reliability. Attended the weekly engineering meeting involving Statistical Process Control (SPC) analysis for product monitoring, where process capability, control chart trends, and variation analysis were reviewed. Gained exposure to the application of SPC tools in quality monitoring and process improvement activities."
    },
    {
      title: "Debugging and Improvement of Automation Workflow",
      date: "2026-04-16",
      details: "Continued coding and debugging activities for the automated file checker project. Focused on improving system functionality, correcting logic errors, and strengthening the automation workflow to enhance efficiency and reduce manual verification effort. Performed testing to validate program outputs against expected checking criteria."
    },
    {
      title: "Project Documentation and Presentation Preparation",
      date: "2026-04-17",
      details: "Continued development of the automated file checker while preparing PowerPoint presentation slides for project progress review. Compiled project background, objectives, methodology, current development status, and anticipated benefits of the automation system. Prepared presentation materials to communicate project progress and technical findings effectively to supervisors and team members."
    },
    {
      title: "Rest day",
      date: "2026-04-18",
      type:"Rest day",
      details: "Rest day."
    },
    {
      title: "Rest day",
      date: "2026-04-19",
      type:"Rest day",
      details: "Rest day."
    },
  ];
  function updateSummary() {
  document.getElementById("totalDays").innerText = events.length;
  document.getElementById("workDays").innerText =
    events.filter(e => e.type !== "Rest day").length;
}
  updateSummary();

  let currentDate = new Date("2026-04-01");

  // Format date nicely
  function formatDate(dateStr) {
    const options = { day: 'numeric', month: 'long', year: 'numeric' };
    return new Date(dateStr).toLocaleDateString('en-GB', options);
  }

  // Update log panel
  function updateLog(dateStr) {
    let logDiv = document.getElementById('logDetails');
    let event = events.find(e => e.date === dateStr);

    if (event) {
      logDiv.innerHTML = `
        <div class="log-date">${formatDate(dateStr)}</div>
        <div class="log-content">${event.details}</div>
      `;
    } else {
      logDiv.innerHTML = `
        <div class="log-date">${formatDate(dateStr)}</div>
        <div class="log-content">📌 No log entry recorded for this date.</div>
      `;
    }
  }

  var calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    initialDate: '2026-04-01',

    validRange: {
      start: '2026-04-01',
      end: '2026-08-01'
    },

    headerToolbar: {
      left: 'prev,next',
      center: 'title',
      right: ''
    },

    events: events,

    dateClick: function(info) {
   currentDate = new Date(info.dateStr);
  selectedDateStr = info.dateStr;
  updateLog(info.dateStr);
  calendar.refetchEvents(); // optional
  calendar.render(); // refresh to apply highlight
},
  eventClick: function(info) {
    info.jsEvent.preventDefault(); // prevent default popup

    let dateStr = info.event.startStr;

    currentDate = new Date(dateStr);
    selectedDateStr = dateStr;

    updateLog(dateStr);
    calendar.gotoDate(dateStr);
    calendar.render();
  },


dayCellClassNames: function(arg) {
  let d = new Date(arg.date);

  let year = d.getFullYear();
  let month = String(d.getMonth() + 1).padStart(2, '0');
  let day = String(d.getDate()).padStart(2, '0');

  let dateStr = `${year}-${month}-${day}`;

  if (dateStr === selectedDateStr) {
    return ['selected-day'];
  }

  return [];
}
  });

  
  calendar.render();

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {

  if (e.key === "ArrowRight") {
    currentDate.setDate(currentDate.getDate() + 1);
  } 
  else if (e.key === "ArrowLeft") {
    currentDate.setDate(currentDate.getDate() - 1);
  }  
  else if (e.key === "ArrowUp") {
    currentDate.setDate(currentDate.getDate() - 7);
  } 
  else if (e.key === "ArrowDown") {
    currentDate.setDate(currentDate.getDate() + 7);
  }
  else return;

  let dateStr = currentDate.toISOString().split('T')[0];

  if (dateStr < "2026-04-01" || dateStr > "2026-07-31") return;

  selectedDateStr = dateStr;
  calendar.gotoDate(dateStr);
  updateLog(dateStr);
  calendar.render(); // reapply highlight
});


});
</script>

</body>
</html>
